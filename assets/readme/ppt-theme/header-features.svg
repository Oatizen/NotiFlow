<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="200" viewBox="0 0 1200 200"
     role="img">
  <!-- Solid Off-White Background (PPT Content Slide) -->
  <rect width="1200" height="200" fill="#fafaf8" />
  
  <!-- Top Meta / Chrome (Monospace, Grey) -->
  <text x="64" y="48" font-family="'JetBrains Mono', 'IBM Plex Mono', monospace" font-size="14" font-weight="500" fill="#737373" letter-spacing="2">CORE FEATURES</text>

  <!-- Horizontal Rule (Accent IKB Blue) -->
  <path d="M 64 72 L 1136 72" stroke="#002FA7" stroke-width="2" />

  <!-- Main Title (Baseline 150, Center ~126) -->
  <text x="64" y="150" font-family="'Inter', 'Noto Sans SC', sans-serif" font-weight="200" font-size="64" fill="#0a0a0a" letter-spacing="-1">核心特性展示</text>

  <!-- Large Number (Baseline 154, Center ~126. Flush right with the blue line at 1136) -->
  <text x="1136" y="154" font-family="'JetBrains Mono', 'IBM Plex Mono', monospace" font-weight="700" font-size="80" fill="#e0e2df" text-anchor="end" letter-spacing="-2">01</text>
  
  <!-- Decorative Element (Danmaku / Message) (Height 36, y=108 gives Center 126) -->
  <g transform="translate(860, 108)">
    <path d="M -8 18 L 8 18 M -4 8 L 12 8 M -2 28 L 10 28" stroke="#dcdfe6" stroke-width="3" stroke-linecap="round" />
    <rect x="20" y="0" width="120" height="36" rx="18" fill="#ffffff" stroke="#dcdfe6" stroke-width="2" />
    <circle cx="44" cy="18" r="8" fill="#002FA7" />
    <rect x="64" y="15" width="56" height="6" rx="3" fill="#e4e7ed" />
  </g>
</svg>
