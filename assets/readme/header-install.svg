<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="160" viewBox="0 0 1200 160"
     role="img" aria-labelledby="title desc">
  <title id="title">Installation Section Header</title>
  <desc id="desc">Header for the installation section.</desc>

  <rect width="1200" height="160" fill="#111111" />
  
  <g transform="translate(64 80)">
    <rect x="0" y="-36" width="6" height="48" rx="3" fill="#0078D7" />
    <text x="24" y="0" font-family="-apple-system, Segoe UI, sans-serif" font-weight="700" font-size="40" fill="#ffffff" letter-spacing="-0.5">下载与安装</text>
    <text x="24" y="32" font-family="-apple-system, Segoe UI, sans-serif" font-weight="600" font-size="16" fill="#0078D7" letter-spacing="1">INSTALLATION</text>
