<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="320" viewBox="0 0 1200 320"
     role="img" aria-labelledby="title desc">
  <title id="title">NotiFlow Hero - Minimal Style</title>
  <desc id="desc">NotiFlow hero banner in a clean, minimalist style.</desc>

  <!-- Clean Off-White Background -->
  <rect width="1200" height="320" fill="#f8f9fa" />
  
  <!-- Subtle Grid Pattern for Technical/Minimalist Feel -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none" />
    <circle cx="20" cy="20" r="1.5" fill="#e0e0e0" />
  </pattern>
  <rect width="1200" height="320" fill="url(#grid)" />

  <!-- Bold, High-Contrast Typography (Swiss Style) -->
  <g transform="translate(80 120)">
    <rect x="0" y="-80" width="48" height="8" fill="#ff4500" />
    <text x="0" y="20" font-family="-apple-system, Helvetica Neue, sans-serif" font-weight="800" font-size="80" fill="#111111" letter-spacing="-2">NotiFlow.</text>
    <text x="400" y="0" font-family="-apple-system, Helvetica Neue, sans-serif" font-weight="500" font-size="24" fill="#555555">Transforming Windows notifications</text>
    <text x="400" y="32" font-family="-apple-system, Helvetica Neue, sans-serif" font-weight="500" font-size="24" fill="#555555">into seamless transparent danmaku.</text>
  </g>

  <!-- Clean Geometry / Diagram representing Danmaku -->
  <g transform="translate(80 220)">
    <!-- Simulated Danmaku Lines -->
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#111111" />
    <circle cx="24" cy="16" r="6" fill="#ff4500" />
    
    <rect x="140" y="0" width="240" height="32" rx="16" fill="#e0e0e0" />
    <circle cx="164" cy="16" r="6" fill="#aaaaaa" />

    <rect x="400" y="0" width="180" height="32" rx="16" fill="#e0e0e0" />
    
    <rect x="180" y="-48" width="220" height="32" rx="16" fill="#111111" />
    <circle cx="204" cy="-32" r="6" fill="#00c853" />
  </g>
</svg>
